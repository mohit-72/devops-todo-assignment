name: Build and Deploy Todo API

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm install

      - name: Build Docker Image
        run: docker build -t todo-api .

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to Azure Container Registry
        run: |
          az acr login --name todoregistry7266

      - name: Build Image
        run: |
          docker build -t todoregistry7266.azurecr.io/todo-api:latest .

      - name: Push Image
        run: |
          docker push todoregistry7266.azurecr.io/todo-api:latest

      - name: Deploy Container App
        run: |
          az containerapp update \
            --name todo-api \
            --resource-group todo-rg \
            --image todoregistry7266.azurecr.io/todo-api:latest